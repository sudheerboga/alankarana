<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#8B1A3A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Alankarana" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Alankarana — Boutique Inventory & Sales</title>
    <style>
      /* Anti-FOUC + splash screen */
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #FBF7F2;
        color: #2A1810;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: contain;
      }
      .app-splash {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;
        background: linear-gradient(135deg, #FBF7F2 0%, #F5E6D3 100%);
        z-index: 9999;
      }
      .app-splash h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 42px; font-weight: 600;
        color: #8B1A3A; margin: 0;
        letter-spacing: 2px;
      }
      .app-splash .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #8B1A3A; animation: pulse 1.4s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-splash">
        <h1>Alankarana</h1>
        <div class="dot"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
